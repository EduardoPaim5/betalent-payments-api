name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  php-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Validate composer metadata
        run: composer validate --strict

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Check code style
        run: vendor/bin/pint --test

      - name: Run tests
        run: php artisan test

  docker-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build stack
        run: docker compose up -d --build

      - name: Wait for API healthcheck
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/up >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs app
          exit 1

      - name: Run app test suite inside Docker
        run: docker compose exec -T app php artisan test

      - name: Run integration suite against real gateway mocks
        run: docker compose exec -T -e RUN_GATEWAY_INTEGRATION_TESTS=true app php artisan test --testsuite=Integration

      - name: Run smoke test
        run: docker compose exec -T app php scripts/smoke.php

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs
